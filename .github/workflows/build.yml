name: Build ShadowClient .exe

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build .exe
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer als artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowClient-Setup
          path: dist/*.exe
          retention-days: 30

      - name: Maak GitHub Release aan
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ShadowClient v1.0.${{ github.run_number }}
          body: |
            ## ShadowClient Launcher
            
            Download de installer hieronder en installeer ShadowClient.
            
            **Functies:**
            - Mods zoeken & downloaden via Modrinth
            - Filter op Minecraft versie & loader
            - Directe download naar .minecraft/mods
          files: dist/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
cat > .github/workflows/build.yml << 'EOF'
name: Build ShadowClient .exe

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build .exe
        run: npm run build
      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: ShadowClient-Setup
          path: dist/*.exe
          retention-days: 30
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ShadowClient v1.0.${{ github.run_number }}
          files: dist/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
EOF